services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudwatch-app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    user: "1000:1000"
    environment:
        HOME: /tmp

  nginx:
    image: nginx:latest
    container_name: cloudwatch-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: cloudwatch-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cloudwatch_lite
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  redis:
    image: redis:latest
    container_name: cloudwatch-redis
    ports:
      - "6379:6379"
